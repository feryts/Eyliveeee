<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>EY LIVE | Giriş Yap</title>

<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="../css/auth.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<div class="authPage">

<div class="authBrand">

<div class="authLogo">🎤</div>

<h1>EY LIVE</h1>

<p>Connect • Chat • Play</p>

</div>

<div class="authCard">

<h2>Tekrar Hoş Geldin</h2>
<p class="authSub">Hesabına giriş yap ve odalara katıl</p>

<form id="loginForm">

<div class="authField">

<label>Telefon veya Kullanıcı Adı</label>
<input type="text" id="loginId" placeholder="Örn: 05xx xxx xx xx" autocomplete="username">

</div>

<div class="authField">

<label>Şifre</label>
<input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">

</div>

<p class="authError" id="loginError"></p>

<button type="submit" class="authPrimaryBtn">Giriş Yap</button>

</form>

<div class="authDivider">veya</div>

<button class="authGhostBtn" id="guestBtn">👋 Misafir Olarak Devam Et</button>

</div>

<p class="authFooterText">Hesabın yok mu? <a href="register.html">Kayıt Ol</a></p>

<p class="authNote">Giriş yaparak topluluk kurallarını kabul etmiş olursun. Bu bir demo ortamıdır, gerçek ödeme veya kimlik bilgisi girmeyin.</p>

</div>

<script src="../core/storage.js"></script>
<script src="../core/auth.js"></script>
<script src="../js/auth-page.js"></script>

</body>

</html>
